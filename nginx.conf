server {
    listen 80;
    server_name _;

    # Increase body size limit (e.g. large strategy param payloads)
    client_max_body_size 10m;

    # ----------------------------------------------------------------
    # SSE / live paper-trading streams
    # Must be matched before the generic /api/ block so that
    # buffering is disabled for event-stream responses.
    # ----------------------------------------------------------------
    location ~* ^/api/(paper-trading|scan).*$ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Critical for Server-Sent Events: disable all buffering
        proxy_buffering            off;
        proxy_cache                off;
        proxy_read_timeout         86400s;
        proxy_send_timeout         86400s;
        chunked_transfer_encoding  on;
    }

    # ----------------------------------------------------------------
    # REST API
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Reasonable timeout for long-running backtest / grid-search requests
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # ----------------------------------------------------------------
    # Health check (short-circuit — no need to hit api router)
    # ----------------------------------------------------------------
    location = /health {
        proxy_pass http://api:3000/api/health;
    }

    # ----------------------------------------------------------------
    # React SPA (frontend static files served by the API process,
    # which hosts dist/web/ via Fastify static plugin or falls through
    # to the SPA index.html for client-side routing).
    # ----------------------------------------------------------------
    location / {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;

        # WebSocket support (for future HMR or live-reload)
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection 'upgrade';

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_cache_bypass $http_upgrade;
    }
}
