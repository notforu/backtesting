name: Deploy to Hetzner

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e
            cd /home/claude/backtesting
            git config --global --add safe.directory /home/claude/backtesting
            echo "=== Git pull ==="
            git pull origin main
            echo "=== Current commit: $(git rev-parse --short HEAD) ==="
            echo "=== Building api ==="
            docker compose --env-file .env.prod -f docker-compose.prod.yml build --build-arg CACHEBUST=$(git rev-parse --short HEAD) --build-arg BUILD_HASH=$(git rev-parse --short HEAD) api
            echo "=== Recreating containers ==="
            docker compose --env-file .env.prod -f docker-compose.prod.yml up -d --force-recreate api nginx
            echo "=== Waiting for health check ==="
            sleep 15
            curl -sf http://localhost/health && echo " OK" || echo " FAILED"
            echo "=== Deployed CSS ==="
            curl -s http://localhost | grep -o 'index-[A-Za-z0-9_-]*\.css' || echo "CSS hash not found"
